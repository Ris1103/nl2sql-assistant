model: unsloth/Phi-3-mini-4k-instruct-bnb-4bit
max_seq_length: 2048
load_in_4bit: true

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

training:
  output_dir: ./adapters/phi3-nl2sql-v1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  num_train_epochs: 1
  max_steps: 500
  warmup_steps: 100
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: cosine
  optim: adamw_8bit
  bf16: false
  fp16: false
  logging_steps: 10
  eval_steps: 200
  save_steps: 200
  save_total_limit: 2
  eval_strategy: steps
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  dataloader_num_workers: 0
  remove_unused_columns: true
  report_to: none

data:
  train_file: ./data/processed/train_instruct.jsonl
  val_file: ./data/processed/val_instruct.jsonl
  max_train_samples: null
  max_val_samples: null

mlflow:
  experiment_name: nl2sql-finetuning
  tracking_uri: ./mlruns
